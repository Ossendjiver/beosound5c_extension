<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Beosound 5c</title>

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="../assets/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="../assets/favicons/android-chrome-512x512.png">
    <link rel="manifest" href="../assets/favicons/site.webmanifest">
    <meta name="theme-color" content="#000000">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../assets/phosphor/phosphor.css">
</head>
<body>
    <div id="app">
        <div class="counter">
            <div id="counter-path"></div>
            <span id="current-item">1</span> / <span id="total-items">8</span>
        </div>
        <div class="hierarchy-depth-1" id="hierarchy-background"></div>
        <div class="arc-container" id="arc-container"></div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/arc-utils.js"></script>
    <script src="../js/emulator-bridge.js"></script>
    <script src="script-v2.js"></script>
    <script>
        async function readJsonIfAvailable(path) {
            try {
                const resp = await fetch(path, { cache: 'no-store' });
                if (!resp || !resp.ok) return null;
                const contentType = String(resp.headers.get('content-type') || '').toLowerCase();
                if (!contentType.includes('json')) return null;
                return await resp.json();
            } catch (_error) {
                return null;
            }
        }

        // Map a scene object to an ArcList item (supports both icon and legacy image)
        function mapScene(scene) {
            const item = { id: scene.id, name: scene.name, actionable: true };
            if (scene.icon) {
                item.icon = scene.icon;
                item.color = scene.color || '#fff';
            } else if (scene.image) {
                item.image = scene.image;
            }
            if (scene.scenes) item.scenes = scene.scenes;
            return item;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                let scenesData = Array.isArray(AppConfig?.scenes) ? AppConfig.scenes : null;
                if (!scenesData) {
                    const config = await readJsonIfAvailable('/json/config.json')
                        || await readJsonIfAvailable('/config/default.json')
                        || await readJsonIfAvailable('../json/config.json');
                    if (Array.isArray(config?.scenes)) {
                        scenesData = config.scenes;
                    }
                }
                if (!scenesData) {
                    const fallback = (typeof AppConfig !== 'undefined' && AppConfig.scenesFile)
                        ? AppConfig.scenesFile
                        : '../json/scenes.json';
                    scenesData = await readJsonIfAvailable(fallback)
                        || await readJsonIfAvailable('../json/scenes.example.json')
                        || [];
                }
                if (!Array.isArray(scenesData)) scenesData = [];
                if (typeof AppConfig !== 'undefined' && !Array.isArray(AppConfig.scenes)) {
                    AppConfig.scenes = scenesData;
                }
                if (scenesData.length === 0) {
                    console.warn('[SCENES] No scenes configured; opening with an empty list');
                }

                const arcList = new ArcList({
                    inlineData: scenesData,
                    levels: [{
                        itemMapper: mapScene,
                        childrenKey: 'scenes',
                        isContainer: (item) => item.scenes?.length > 0,
                    }],  // Single level reused recursively — scenes can nest infinitely
                    storagePrefix: 'scenes_arclist',
                    context: 'scenes',
                    webhookUrl: typeof AppConfig !== 'undefined' ? AppConfig.webhookUrl : null,
                });
                window.arcListInstance = arcList;

                const clampIndex = (items, index) => {
                    if (!Array.isArray(items) || !items.length) return 0;
                    return Math.max(0, Math.min(items.length - 1, Math.round(index || 0)));
                };

                const topLevelItems = () => arcList.mapItems(scenesData, 0);

                const resolveSelectedContextId = () => {
                    if (Array.isArray(arcList.navStack) && arcList.navStack.length > 0) {
                        return String(arcList.navStack[0]?.selectedItem?.id || '').trim();
                    }
                    const items = Array.isArray(arcList.items) ? arcList.items : [];
                    const currentIndex = clampIndex(items, arcList.currentIndex);
                    return String(items[currentIndex]?.id || '').trim();
                };

                const resolveActiveContextId = () => {
                    if (Array.isArray(arcList.navStack) && arcList.navStack.length > 0) {
                        return String(arcList.navStack[0]?.selectedItem?.id || '').trim();
                    }
                    return '';
                };

                const trimRootBreadcrumb = () => {
                    if (!arcList.container) return;
                    const breadcrumbs = Array.from(arcList.container.querySelectorAll('.arc-item.breadcrumb'));
                    if (!breadcrumbs.length) return;
                    let rootCrumb = null;
                    let highestSlot = -1;
                    breadcrumbs.forEach((crumb) => {
                        const slot = Number(crumb.dataset.slotIndex || -1);
                        if (slot > highestSlot) {
                            highestSlot = slot;
                            rootCrumb = crumb;
                        }
                    });
                    rootCrumb?.remove();
                };

                const publishContextMenu = () => {
                    if (!window.parent || window.parent === window) return;
                    const items = topLevelItems()
                        .map((item) => ({
                            id: String(item?.id || '').trim(),
                            title: String(item?.name || '').trim(),
                        }))
                        .filter((item) => item.id && item.title);
                    const selectedId = resolveSelectedContextId();
                    const activeId = resolveActiveContextId();
                    window.parent.postMessage({
                        type: 'bs5c-context-menu',
                        route: 'menu/scenes',
                        items,
                        selectedId: selectedId || items[0]?.id || '',
                        activeId,
                    }, '*');
                };

                const originalRender = arcList.render?.bind(arcList);
                const originalHandleButtonFromParent = arcList.handleButtonFromParent?.bind(arcList);
                const originalHandleKeyPress = arcList.handleKeyPress?.bind(arcList);
                arcList.render = function () {
                    if (typeof originalRender === 'function') {
                        originalRender();
                    }
                    trimRootBreadcrumb();
                    publishContextMenu();
                };

                const resetToTopLevel = (preferredId = '') => {
                    const normalizedId = String(preferredId || '').trim();
                    const roots = topLevelItems();
                    const rootIndex = roots.findIndex((item) => String(item?.id || '').trim() === normalizedId);

                    if (arcList.container) {
                        arcList.container.querySelectorAll('.arc-item.breadcrumb').forEach((node) => node.remove());
                    }

                    arcList.navStack = [];
                    arcList.depth = 0;
                    arcList.items = roots;
                    arcList.currentIndex = clampIndex(roots, rootIndex >= 0 ? rootIndex : 0);
                    arcList.targetIndex = arcList.currentIndex;

                    if (typeof arcList.updateCounter === 'function') {
                        arcList.updateCounter();
                    }
                    if (arcList.totalItemsDisplay) {
                        arcList.totalItemsDisplay.textContent = arcList.items.length;
                    }
                    arcList.render();
                    return true;
                };

                const openTopLevelScene = (itemId) => {
                    const normalizedId = String(itemId || '').trim();
                    if (!normalizedId) return false;

                    const roots = topLevelItems();
                    const rootIndex = roots.findIndex((item) => String(item?.id || '').trim() === normalizedId);
                    if (rootIndex < 0) return false;

                    const rawRoot = Array.isArray(scenesData) ? scenesData[rootIndex] : null;
                    resetToTopLevel(normalizedId);

                    if (Array.isArray(rawRoot?.scenes) && rawRoot.scenes.length > 0) {
                        arcList.navStack.push({
                            items: roots.slice(),
                            rawItems: Array.isArray(scenesData) ? scenesData.slice() : [],
                            selectedIndex: rootIndex,
                            selectedItem: roots[rootIndex],
                            breadcrumbElement: null,
                        });
                        arcList.depth = 1;
                        arcList.items = arcList.mapItems(rawRoot.scenes, 1);
                        arcList.currentIndex = 0;
                        arcList.targetIndex = 0;
                        if (typeof arcList._createBreadcrumbsFromStack === 'function') {
                            arcList._createBreadcrumbsFromStack();
                        }
                    }

                    if (typeof arcList.updateCounter === 'function') {
                        arcList.updateCounter();
                    }
                    if (arcList.totalItemsDisplay) {
                        arcList.totalItemsDisplay.textContent = arcList.items.length;
                    }
                    arcList.render();
                    return true;
                };

                const postContextExit = (preferredId = '') => {
                    resetToTopLevel(preferredId);
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage({
                            type: 'bs5c-context-exit',
                            route: 'menu/scenes',
                        }, '*');
                    }
                    return true;
                };

                arcList.handleButtonFromParent = function (button) {
                    const normalized = String(button || '').toLowerCase();
                    if (normalized === 'right' && arcList.depth <= 1) {
                        return postContextExit(resolveSelectedContextId());
                    }
                    if (typeof originalHandleButtonFromParent === 'function') {
                        return originalHandleButtonFromParent(button);
                    }
                    return undefined;
                };

                arcList.handleKeyPress = function (e) {
                    if (e.key === 'ArrowRight' && arcList.depth <= 1) {
                        return postContextExit(resolveSelectedContextId());
                    }
                    if (typeof originalHandleKeyPress === 'function') {
                        return originalHandleKeyPress(e);
                    }
                    return undefined;
                };

                resetToTopLevel(resolveSelectedContextId());

                window.addEventListener('message', (event) => {
                    if (event.data?.type === 'context-select') {
                        openTopLevelScene(event.data?.id);
                        return;
                    }
                    if (event.data?.type === 'context-reset') {
                        resetToTopLevel(resolveSelectedContextId());
                    }
                });
            } catch (error) {
                console.error('Scenes initialization error:', error);
                document.body.innerHTML = '<div style="color:red;padding:20px;">Error: ' + error.message + '</div>';
            }
        });
    </script>
</body>
</html>
