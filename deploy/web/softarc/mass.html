<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASS - Beosound 5c</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="splash.css">
    <link rel="stylesheet" href="../assets/phosphor/phosphor.css">
    
    <style>
        .list-item .item-text {
            max-width: 340px !important;
        }

        .list-item .item-image-container {
            max-width: 104px !important;
        }

        .mass-breadcrumb .item-name {
            max-width: 220px;
            white-space: normal;
            line-height: 1.1;
        }

        .mass-breadcrumb .item-image-container {
            max-width: 96px !important;
        }

        .fast-letter-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 116px;
            height: 116px;
            margin-left: -58px;
            margin-top: -58px;
            border-radius: 26px;
            background: rgba(9, 14, 24, 0.22);
            border: 1px solid rgba(141, 175, 228, 0.18);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(8px);
            color: #ffffff;
            font: 300 58px/116px Arial, sans-serif;
            text-align: center;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 90ms linear, transform 90ms ease;
            pointer-events: none;
            z-index: 3600;
        }

        .fast-letter-overlay.visible {
            opacity: 1;
            transform: scale(1);
        }

        .action-toast-overlay {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            min-width: 220px;
            max-width: 460px;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(8, 12, 20, 0.72);
            border: 1px solid rgba(148, 199, 255, 0.22);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(8px);
            color: #f2f7ff;
            font: 500 14px/1.25 Arial, sans-serif;
            letter-spacing: 0.3px;
            text-align: center;
            opacity: 0;
            transition: opacity 140ms ease, transform 140ms ease;
            pointer-events: none;
            z-index: 3800;
        }

        .action-toast-overlay.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .options-view {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8vh;
            z-index: 6;
        }

        .options-panel {
            width: min(500px, calc(100vw - 500px));
            max-height: 72vh;
            padding: 16px 18px 14px;
            border-radius: 24px;
            background: rgba(10, 10, 10, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(16px);
            color: #f4f4f4;
            overflow: hidden;
        }

        .options-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 10px;
        }

        .options-kicker {
            color: rgba(255, 255, 255, 0.58);
            font: 600 11px/1.2 Arial, sans-serif;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .options-title {
            color: #fff;
            font: 300 22px/1.12 Arial, sans-serif;
            letter-spacing: 0.4px;
            margin: 0;
        }

        .options-subtitle {
            color: rgba(255, 255, 255, 0.56);
            font: 400 11px/1.35 Arial, sans-serif;
            margin-top: 4px;
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .options-hint {
            flex: 0 0 auto;
            color: rgba(255, 255, 255, 0.42);
            font: 500 11px/1.25 Arial, sans-serif;
            letter-spacing: 1.2px;
            text-align: right;
            text-transform: uppercase;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 54vh;
            overflow-y: auto;
            padding-right: 2px;
            scrollbar-width: none;
        }

        .options-list::-webkit-scrollbar {
            display: none;
        }

        .options-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 36px;
            padding: 8px 10px;
            border-radius: 12px;
            color: rgba(245, 245, 245, 0.92);
            transition: background 120ms ease, box-shadow 120ms ease, color 120ms ease;
        }

        .options-entry.is-selected {
            background: rgba(255, 255, 255, 0.14);
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
        }

        .options-entry-icon {
            width: 24px;
            color: rgba(255, 255, 255, 0.68);
            font-size: 18px;
            text-align: center;
            flex: 0 0 auto;
        }

        .options-entry-copy {
            flex: 1 1 auto;
            min-width: 0;
        }

        .options-entry-title {
            color: inherit;
            font: 500 14px/1.2 Arial, sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .options-entry-subtitle {
            display: none;
        }

        .options-entry-arrow {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            flex: 0 0 auto;
        }

        .page-view {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-start;
            opacity: 0;
            transition: opacity 300ms ease;
            z-index: 5;
        }

        .page-view-scroll {
            margin-left: 350px;
            margin-right: 180px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 40px 0 52px;
            scrollbar-width: none;
        }

        .page-view-scroll::-webkit-scrollbar {
            display: none;
        }

        .page-view-title {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #fff;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .page-view-body {
            font-size: 0.95rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.82);
        }

        .page-view.page-view-mass {
            padding-top: 6vh;
        }

        .page-view.page-view-mass .page-view-scroll {
            width: min(470px, calc(100vw - 560px));
        }

        .page-view.page-view-mass .page-view-body img {
            width: 100%;
            display: block;
            margin-bottom: 1.25rem;
            border-radius: 0.85rem;
            box-shadow: 0 22px 44px rgba(0, 0, 0, 0.35);
        }

        .mass-detail-subtitle {
            margin-bottom: 1.1rem;
            color: #ffffff;
            font-size: 1rem;
            line-height: 1.45;
        }

        .mass-detail-section-label {
            margin: 1.3rem 0 0.65rem;
            color: rgba(160, 205, 255, 0.92);
            font-size: 0.78rem;
            letter-spacing: 1.6px;
            text-transform: uppercase;
        }

        .mass-detail-empty {
            color: rgba(255, 255, 255, 0.7);
        }

        .mass-detail-facts {
            display: grid;
            gap: 0.5rem;
            margin: 0 0 1.2rem;
        }

        .mass-detail-fact {
            display: grid;
            grid-template-columns: 92px 1fr;
            gap: 0.7rem;
            align-items: start;
        }

        .mass-detail-fact-label {
            color: rgba(160, 205, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-size: 0.74rem;
        }

        .mass-detail-fact-value {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.45;
        }

        .page-view.page-view-mass .page-view-body p {
            margin-bottom: 0.95rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="sync-indicator" style="position: absolute; top: 15px; right: 20px; display: none; align-items: center; gap: 8px; z-index: 1000; background: rgba(10,10,10,0.85); padding: 6px 12px; border-radius: 20px; color: #aaa; font-family: sans-serif; font-size: 11px; letter-spacing: 1px; border: 1px solid #333;">
            <div class="loading-spinner" style="width: 12px; height: 12px; border-width: 2px;"></div>
            SYNCING
        </div>

        <div class="counter">
            <span id="current-item">1</span> / <span id="total-items">100</span>
        </div>
        <div class="hierarchy-depth-1" id="hierarchy-background"></div>
        <div class="arc-container" id="arc-container"></div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/arc-utils.js"></script>
    <script src="../js/emulator-bridge.js"></script>
    <script src="../assets/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script>
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        // Sync monitor â€” watches item count growth between polls
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        let lastItemCount = 0;

        function countTotalItems(data) {
            if (!Array.isArray(data)) return 0;
            let count = 0;
            data.forEach(category => {
                if (category.tracks) count += category.tracks.length;
            });
            return count;
        }

        function startSyncMonitor(MASS_URL) {
            setInterval(async () => {
                try {
                    const resp = await fetch(`${MASS_URL}/playlists`);
                    if (!resp.ok) return;
                    const data = await resp.json();
                    const payload = Array.isArray(data) ? data : (data.data || data);
                    const currentCount = countTotalItems(payload);
                    const indicator = document.getElementById('sync-indicator');
                    if (indicator) {
                        if (currentCount > lastItemCount && lastItemCount > 0) {
                            indicator.style.display = 'flex';
                        } else if (currentCount === lastItemCount) {
                            indicator.style.display = 'none';
                        }
                    }
                    lastItemCount = currentCount;
                } catch (e) {}
            }, 4000);
        }

        function showRuntimeError(source, error) {
            const app = document.getElementById('app');
            if (!app) return;
            const message = (error && error.message) ? error.message : String(error || 'Unknown error');
            let panel = document.getElementById('runtime-error-panel');
            if (!panel) {
                panel = document.createElement('div');
                panel.id = 'runtime-error-panel';
                panel.style.cssText = 'position:absolute;right:16px;bottom:16px;max-width:420px;padding:12px 14px;background:rgba(20,0,0,0.92);border:1px solid #a33;color:#f5dcdc;font:12px/1.4 monospace;z-index:4000;white-space:pre-wrap;';
                app.appendChild(panel);
            }
            panel.textContent = `[MASS ${source}] ${message}`;
            console.error('[MASS UI ERROR]', source, error);
        }

        const SHOW_RUNTIME_ERRORS = /(?:\?|&)debugErrors=1(?:&|$)/.test(window.location.search);
        if (SHOW_RUNTIME_ERRORS) {
            window.addEventListener('error', (event) => {
                showRuntimeError('error', event.error || event.message);
            });

            window.addEventListener('unhandledrejection', (event) => {
                showRuntimeError('promise', event.reason);
            });
        }

        const STATIC_CACHE_URL = '../json/mass_playlists.json';
        const SERVICE_BOOT_TIMEOUT_MS = 900;
        const ACTION_TOAST_MIN_MS = 2000;
        const ACTION_TOAST_MAX_MS = 4000;
        const FAST_LETTER_MIN_SPEED = 3;
        const FAST_LETTER_ARTICLES = new Set(['A', 'AN', 'THE']);

        async function fetchJson(url, options = {}) {
            const timeoutMs = Number(options.timeoutMs || 0);
            const controller = timeoutMs > 0 ? new AbortController() : null;
            let timeoutId = null;
            try {
                if (controller) {
                    timeoutId = setTimeout(() => controller.abort(), timeoutMs);
                }
                const resp = await fetch(url, {
                    cache: options.cacheMode || 'no-store',
                    signal: controller ? controller.signal : undefined,
                });
                if (!resp.ok) return null;
                return await resp.json();
            } catch (error) {
                return null;
            } finally {
                if (timeoutId) clearTimeout(timeoutId);
            }
        }

        function normalizeLibraryPayload(raw) {
            return Array.isArray(raw) ? raw : (raw?.data || raw);
        }

        let actionToastState = null;
        const ensureActionToast = () => {
            let overlay = document.getElementById('action-toast-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'action-toast-overlay';
                overlay.className = 'action-toast-overlay';
                document.getElementById('app')?.appendChild(overlay);
            }
            return overlay;
        };

        const clearActionToastTimers = () => {
            if (!actionToastState) return;
            if (actionToastState.hideTimer) clearTimeout(actionToastState.hideTimer);
            if (actionToastState.maxTimer) clearTimeout(actionToastState.maxTimer);
            actionToastState.hideTimer = null;
            actionToastState.maxTimer = null;
        };

        const hideActionToast = () => {
            const overlay = document.getElementById('action-toast-overlay');
            if (overlay) overlay.classList.remove('visible');
            clearActionToastTimers();
            actionToastState = null;
        };

        const showActionToast = (message, options = {}) => {
            const overlay = ensureActionToast();
            const preserveTiming = Boolean(options.preserveTiming && actionToastState);
            if (!preserveTiming) {
                clearActionToastTimers();
                actionToastState = {
                    shownAt: Date.now(),
                    hideTimer: null,
                    maxTimer: setTimeout(hideActionToast, ACTION_TOAST_MAX_MS),
                };
            }
            overlay.textContent = message;
            overlay.classList.add('visible');
        };

        const settleActionToast = () => {
            if (!actionToastState) return;
            const elapsed = Date.now() - actionToastState.shownAt;
            const waitMs = Math.max(0, ACTION_TOAST_MIN_MS - elapsed);
            if (actionToastState.hideTimer) clearTimeout(actionToastState.hideTimer);
            actionToastState.hideTimer = setTimeout(hideActionToast, waitMs);
        };

        async function loadStaticLibrary() {
            const raw = await fetchJson(STATIC_CACHE_URL, {
                timeoutMs: 2500,
                cacheMode: 'no-cache',
            });
            const data = normalizeLibraryPayload(raw);
            return Array.isArray(data) && countTotalItems(data) > 0 ? data : null;
        }

        async function readServiceBootState(serviceUrl) {
            const raw = await fetchJson(`${serviceUrl}/playlists`, {
                timeoutMs: SERVICE_BOOT_TIMEOUT_MS,
                cacheMode: 'no-store',
            });
            if (!raw) return { status: 'unreachable', data: null };
            const data = normalizeLibraryPayload(raw);
            if (raw.setup_needed) return { status: 'setup_needed', data: null };
            if (raw.needs_reauth) return { status: 'needs_reauth', data: null };
            if (raw.loading) return { status: 'loading', data: null };
            if (Array.isArray(data) && data.length > 0) {
                const itemCount = countTotalItems(data);
                if (itemCount === 0) {
                    return { status: 'loading', data: null };
                }
                return { status: 'ready', data };
            }
            return { status: 'empty', data: Array.isArray(data) ? data : [] };
        }

        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        // Boot sequence
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        document.addEventListener('DOMContentLoaded', async () => {
            const MASS_URL = getServiceUrl('massServiceUrl', 8783);
            const cachedLibrary = await loadStaticLibrary();

            if (Array.isArray(cachedLibrary) && cachedLibrary.length > 0) {
                lastItemCount = countTotalItems(cachedLibrary);
                initArcList(cachedLibrary, MASS_URL);
                startSyncMonitor(MASS_URL);
                void readServiceBootState(MASS_URL);
                return;
            }

            const serviceState = await readServiceBootState(MASS_URL);

            if (serviceState.status === 'setup_needed') {
                showSetupScreen(MASS_URL);
                return;
            }
            if (serviceState.status === 'needs_reauth') {
                showSetupScreen(MASS_URL, true);
                return;
            }

            if (Array.isArray(serviceState.data) && serviceState.data.length > 0) {
                lastItemCount = countTotalItems(serviceState.data);
                initArcList(serviceState.data, MASS_URL);
                startSyncMonitor(MASS_URL);
                return;
            }

            if (serviceState.status === 'empty') {
                showEmptyScreen();
                return;
            }

            showLoadingScreen();
        });

        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        // Setup / login screen
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        let loginStarted = false;

        function showSetupScreen(serviceUrl, isReconnect) {
            const title = isReconnect ? 'RECONNECT MASS' : 'CONNECT MASS';
            const msg = isReconnect
                ? 'Your session has expired.<br>Press GO to start a new login'
                : 'Press GO to start the MASS login process';

            document.getElementById('app').innerHTML = `
                <div class="splash-screen">
                    <div class="splash-card">
                        <h2>${title}</h2>
                        <p>${msg}</p>
                        <div id="setup-qr" class="setup-qr" style="display:none"></div>
                        <div id="setup-url" class="setup-url"></div>
                        <div id="setup-status" style="color:#666;font-size:13px;margin-top:12px"></div>
                    </div>
                </div>`;

            window.addEventListener('message', async (e) => {
                if (e.data && e.data.type === 'button' && e.data.button === 'go' && !loginStarted) {
                    loginStarted = true;
                    await startLogin(serviceUrl);
                }
            });

            loginStarted = true;
            startLogin(serviceUrl);
        }

        async function startLogin(serviceUrl) {
            const statusEl = document.getElementById('setup-status');
            const urlEl    = document.getElementById('setup-url');
            const qrEl     = document.getElementById('setup-qr');

            statusEl.textContent = 'Starting login...';

            try {
                const resp = await fetch(`${serviceUrl}/start-login`, { method: 'POST' });
                const data = await resp.json();
                if (data.error) {
                    statusEl.textContent = 'Error: ' + data.error;
                    return;
                }

                const url = data.url;
                urlEl.textContent = url;

                if (typeof QRCode !== 'undefined') {
                    qrEl.style.display = 'inline-block';
                    qrEl.innerHTML = '';
                    new QRCode(qrEl, {
                        text: url, width: 180, height: 180,
                        colorDark: '#000000', colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }

                statusEl.textContent = 'Scan QR code or open URL on your phone';

                const pollInterval = setInterval(async () => {
                    try {
                        const check  = await fetch(`${serviceUrl}/check-login`, { method: 'POST' });
                        const result = await check.json();
                        if (result.status === 'ok') {
                            clearInterval(pollInterval);
                            statusEl.textContent = 'Connected! Loading library...';
                            pollForPlaylists();
                        } else if (result.status === 'expired' || result.status === 'error') {
                            clearInterval(pollInterval);
                            statusEl.textContent = result.status === 'expired'
                                ? 'Login expired. Press GO.'
                                : (result.error || 'Login failed.');
                            if (qrEl) qrEl.style.display = 'none';
                            urlEl.textContent = '';
                            loginStarted = false;
                        }
                    } catch (e) {}
                }, 3000);
            } catch (e) {
                if (statusEl) statusEl.textContent = 'Error: ' + e.message;
                loginStarted = false;
            }
        }

        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        // Splash screens
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function showEmptyScreen() {
            document.getElementById('app').innerHTML = `
                <div class="splash-screen">
                    <div class="splash-card">
                        <h2>NO MUSIC FOUND</h2>
                        <p>Your MASS library appears empty.<br>
                        Add content via the Music Assistant interface.</p>
                    </div>
                </div>`;
            pollForPlaylists();
        }

        function showLoadingScreen() {
            document.getElementById('app').innerHTML = `
                <div class="splash-screen">
                    <div class="splash-card">
                        <div class="loading-spinner"></div>
                        <h2 style="letter-spacing: 2px;">BUILDING LIBRARY</h2>
                        <p style="color: #888;">Music Assistant is syncing your library.<br>
                        This will take a moment...</p>
                    </div>
                </div>`;
            pollForPlaylists();
        }

        function pollForPlaylists() {
            const MASS_URL = getServiceUrl('massServiceUrl', 8783);
            const poll = setInterval(async () => {
                try {
                    const resp = await fetch(`${MASS_URL}/playlists`);
                    if (resp.ok) {
                        const raw  = await resp.json();
                        const data = Array.isArray(raw) ? raw : (raw.data || raw);
                        if (Array.isArray(data) && countTotalItems(data) > 0) {
                            clearInterval(poll);
                            location.reload();
                        }
                    }
                } catch (e) {}
            }, 3000);
        }

        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        // ArcList initialisation
        // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function initArcList(preloadedData, massUrl) {
            const serviceBaseUrl = massUrl || getServiceUrl('massServiceUrl', 8783);
            const sourceCommandUrl = serviceBaseUrl + '/command';
            const queueUrl = serviceBaseUrl + '/queue';
            const itemInfoUrl = serviceBaseUrl + '/item_info';
            const FALLBACK_CARD_IMAGE = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiBmaWxsPSIjMzMzMzMzIi8+Cjx0ZXh0IHg9IjMyIiB5PSI0MCIgZm9udC1mYW1pbHk9IkFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjI0IiBmaWxsPSIjZmZmZmZmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7imqo8L3RleHQ+Cjwvc3ZnPgo=';
            const ROOT_ICON_STYLE = {
                artists:   { icon: 'users-three', color: '#e05618' },
                albums:    { icon: 'vinyl-record', color: '#1c7ed6' },
                titles:    { icon: 'music-notes-simple', color: '#2b8a3e' },
                playlists: { icon: 'list-bullets', color: '#862e9c' },
                playlist_mixes: { icon: 'shuffle', color: '#b14ae0' },
                podcasts:  { icon: 'microphone', color: '#ff6b6b' },
                mixes:     { icon: 'radio', color: '#e6ca19' },
            };
            const SOURCE_ROOT_IDS = new Set(['queue', 'artists', 'albums', 'songs', 'playlists', 'playlist_mixes', 'podcasts', 'mixes']);
            const ROOT_SECTION_IDS = new Set(['queue', 'artists', 'albums', 'titles', 'playlists', 'playlist_mixes', 'podcasts', 'mixes']);
            const CROSS_SECTION_TARGET_IDS = new Set(['artists', 'albums', 'titles']);
            const cleanTitle = (value) => String(value || '').split('\n')[0].trim();
            const normalizeServiceImageUrl = (value) => {
                const raw = String(value || '').trim();
                if (!raw) return '';
                return raw.startsWith('/art/') ? `${serviceBaseUrl}${raw}` : raw;
            };
            const escapeHtml = (value) => String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
            const trackMetaByKey = new Map();
            let queueRootNode = null;

            const mergeMeta = (existing = {}, incoming = {}) => ({
                artist: existing.artist || incoming.artist || '',
                album: existing.album || incoming.album || '',
                artwork: existing.artwork || incoming.artwork || '',
            });

            const rememberTrackMeta = (node, metadata = {}) => {
                if (!node || typeof node !== 'object') return;
                const normalizedMeta = {
                    artist: String(metadata.artist || '').trim(),
                    album: String(metadata.album || '').trim(),
                    artwork: normalizeServiceImageUrl(metadata.artwork || ''),
                };

                [node.id, node.url, node.play_url].forEach((rawKey) => {
                    const key = String(rawKey || '').trim();
                    if (!key) return;
                    trackMetaByKey.set(key, mergeMeta(trackMetaByKey.get(key), normalizedMeta));
                });
            };

            const collectTrackMeta = (node, context = {}) => {
                if (!node || typeof node !== 'object') return;

                const children = Array.isArray(node.tracks) ? node.tracks : null;
                const nodeName = cleanTitle(node.name);
                const nodeArtist = String(node.artist || context.artist || '').trim();
                const nodeArtwork = normalizeServiceImageUrl(node.image || context.artwork || '');
                const containsLeaves = !!children?.some((child) => !Array.isArray(child?.tracks) || child.tracks.length === 0);
                const isRootCategory = SOURCE_ROOT_IDS.has(String(node.id || ''));

                rememberTrackMeta(node, {
                    artist: nodeArtist,
                    album: containsLeaves && !isRootCategory ? nodeName : String(context.album || '').trim(),
                    artwork: nodeArtwork,
                });

                if (!children?.length) return;

                const nextContext = {
                    artist: context.artist || '',
                    album: context.album || '',
                    artwork: context.artwork || '',
                };

                if (containsLeaves && !isRootCategory) {
                    nextContext.album = nodeName || nextContext.album;
                    nextContext.artist = nodeArtist || nextContext.artist;
                    nextContext.artwork = nodeArtwork || nextContext.artwork;
                } else if (!isRootCategory) {
                    nextContext.artist = nodeArtist || nodeName || nextContext.artist;
                    nextContext.artwork = nodeArtwork || nextContext.artwork;
                } else if (nodeArtwork) {
                    nextContext.artwork = nodeArtwork;
                }

                children.forEach((child) => collectTrackMeta(child, nextContext));
            };

            (Array.isArray(preloadedData) ? preloadedData : []).forEach((item) => collectTrackMeta(item));

            const getItemMeta = (item) => {
                if (!item || typeof item !== 'object') {
                    return { artist: '', album: '', artwork: '' };
                }

                let metadata = { artist: '', album: '', artwork: '' };
                [item.id, item.url, item.play_url].forEach((rawKey) => {
                    const key = String(rawKey || '').trim();
                    if (!key) return;
                    metadata = mergeMeta(metadata, trackMetaByKey.get(key));
                });

                return mergeMeta(metadata, {
                    artist: item.artist || '',
                    album: item.album || '',
                    artwork: normalizeServiceImageUrl(item.image || ''),
                });
            };

            // â”€â”€ childNameMapper â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            // Normalises items at every depth for ArcList display.
            //
            // RULES:
            //   â€¢ Folder nodes (have non-empty `tracks`): KEEP `play_url`, DELETE `url`.
            //     `play_url` is the MA URI used to play the whole folder.
            //     ArcList uses absence of `url` to know not to auto-play.
            //   â€¢ Leaf nodes: KEEP `url`, no `tracks`.
            //   â€¢ `play_url` must never be deleted â€” both branches need it to survive.
            const childNameMapper = (item, index, allItems) => {
                let displayName = item.name || '';
                const isFolder  = Array.isArray(item.tracks) && item.tracks.length > 0;
                const metadata = getItemMeta(item);
                const resolvedArtist = item.artist || metadata.artist || '';
                const hasArtist = resolvedArtist
                    && resolvedArtist !== 'Artist'
                    && resolvedArtist !== 'Playlist'
                    && resolvedArtist !== 'Mix'
                    && resolvedArtist !== 'Various';

                if (!isFolder && hasArtist && Array.isArray(allItems) && allItems.length > 0) {
                    const firstArtist = allItems[0].artist || getItemMeta(allItems[0]).artist || '';
                    const allSameArtist = allItems.every((entry) => {
                        const artist = entry.artist || getItemMeta(entry).artist || '';
                        return artist === firstArtist;
                    });
                    if (!allSameArtist) {
                        displayName = `${item.name}\n(${resolvedArtist})`;
                    }
                }

                const mapped = Object.assign({}, item, { name: displayName });
                if (!mapped.artist && metadata.artist) mapped.artist = metadata.artist;
                if (!mapped.album && metadata.album) mapped.album = metadata.album;

                if (!mapped.image) {
                    mapped.image = metadata.artwork || FALLBACK_CARD_IMAGE;
                } else {
                    mapped.image = normalizeServiceImageUrl(mapped.image);
                }

                if (isFolder) {
                    // Folders: remove `url` (signals playability to ArcList),
                    // keep `play_url` for GO-to-play support.
                    delete mapped.url;
                } else {
                    // Leaves: remove empty tracks arrays that look like folders.
                    if (Array.isArray(mapped.tracks) && mapped.tracks.length === 0) {
                        delete mapped.tracks;
                    }
                    if (!mapped.url) {
                        console.warn('[MASS] Leaf item has no url:', mapped.name);
                    }
                }

                return mapped;
            };

            const withQueueRoot = (items) => {
                const baseItems = Array.isArray(items) ? items.slice() : [];
                if (queueRootNode && Array.isArray(queueRootNode.tracks) && queueRootNode.tracks.length) {
                    return [queueRootNode].concat(baseItems);
                }
                return baseItems;
            };

            const buildDisplayRootSource = (items) => {
                const displayItems = [];
                (Array.isArray(items) ? items : []).forEach((item) => {
                    const sourceId = String(item?.id || '').trim();
                    if (sourceId === 'songs') {
                        displayItems.push(Object.assign({}, item, { id: 'titles', name: 'Titles' }));
                        return;
                    }
                    displayItems.push(item);
                });
                return displayItems;
            };

            const applyRootPresentation = (item) => {
                const visual = ROOT_ICON_STYLE[String(item?.id || '')];
                if (!visual) return item;
                return Object.assign({}, item, {
                    icon: visual.icon,
                    color: visual.color,
                });
            };

            const massConfig = {
                inlineData:      Array.isArray(preloadedData) ? preloadedData : [],
                dataSource:      STATIC_CACHE_URL,
                dataType:        'parent_child',
                viewMode:        'hierarchical',
                parentKey:       'tracks',
                parentNameKey:   'name',
                storagePrefix:   'mass_arclist',
                title:           'MUSIC',
                context:         'mass',
                sourceCommandUrl,
                childNameMapper,
            };

            const arcList = new ArcList(massConfig);

            // â”€â”€ Stash original methods before override â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const folderStack = [];
            const originalHandleButtonFromParent = arcList.handleButtonFromParent?.bind(arcList);
            const originalHandleNavFromParent    = arcList.handleNavFromParent?.bind(arcList);
            const originalHandleKeyPress         = arcList.handleKeyPress?.bind(arcList);
            const originalCheckForSelectionClick = arcList.checkForSelectionClick?.bind(arcList);
            const originalRender                 = arcList.render?.bind(arcList);
            const originalCreateImageElement     = arcList.createImageElement?.bind(arcList);
            const originalSaveState              = arcList.saveState?.bind(arcList);
            const originalDestroy                = arcList.destroy?.bind(arcList);
            const MASS_BROWSE_STATE_KEY          = `${massConfig.storagePrefix}_browse_state_v1`;
            const MASS_SECTION_CONTEXT_KEY       = `${massConfig.storagePrefix}_section_context_v1`;
            let lastBrowseContextStamp           = 0;
            let lastSectionBrowseContext         = null;

            arcList.createImageElement = function (item) {
                if (item?.icon) {
                    const iconBox = document.createElement('div');
                    iconBox.className = 'item-image item-icon';
                    iconBox.style.color = item.color || '#ffffff';
                    const icon = document.createElement('i');
                    icon.className = `ph ph-${item.icon}`;
                    iconBox.appendChild(icon);
                    return iconBox;
                }
                if (typeof originalCreateImageElement === 'function') {
                    return originalCreateImageElement(item);
                }
                const img = document.createElement('img');
                img.className = 'item-image';
                img.src = item?.image || FALLBACK_CARD_IMAGE;
                img.alt = item?.name || '';
                return img;
            };

            // Clear old-format localStorage keys that conflict with our nav layer
            [
                `${massConfig.storagePrefix}_parent_position`,
                `${massConfig.storagePrefix}_child_position`,
                `${massConfig.storagePrefix}_view_mode`,
                `${massConfig.storagePrefix}_selected_parent`,
                `${massConfig.storagePrefix}_nested_state_v1`,
            ].forEach(key => localStorage.removeItem(key));

            // â”€â”€ Navigation helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const getCurrentItem = () => {
                const index = Math.max(0, Math.min(arcList.items.length - 1,
                    Math.round(arcList.currentIndex || 0)));
                return arcList.items[index] || null;
            };

            const clampIndex = (items, index) => {
                if (!items || !items.length) return 0;
                return Math.max(0, Math.min(items.length - 1, Math.round(index || 0)));
            };

            const itemKey = (item) => String(
                item?.id
                || item?.url
                || item?.play_url
                || cleanTitle(item?.name)
                || ''
            ).trim();

            const normalizeLookup = (value) => cleanTitle(String(value || ''))
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, ' ')
                .trim();

            const normalizeSectionContext = (context = {}) => {
                const sourceContext = (context && typeof context === 'object') ? context : {};
                const rawRootId = String(sourceContext.root_id || '').trim();
                const normalizedRootId = rawRootId === 'songs' ? 'titles' : rawRootId;
                const normalized = {
                    source: String(sourceContext.source || 'mass').trim() || 'mass',
                    ts: Number(sourceContext.ts || Date.now()) || Date.now(),
                    root_id: normalizedRootId,
                    artist: cleanTitle(sourceContext.artist || ''),
                    album: cleanTitle(sourceContext.album || ''),
                    title: cleanTitle(sourceContext.title || ''),
                    selection_key: String(sourceContext.selection_key || '').trim(),
                    selection_name: cleanTitle(sourceContext.selection_name || ''),
                };
                return (normalized.artist || normalized.album || normalized.title || normalized.selection_name)
                    ? normalized
                    : null;
            };

            const loadSectionBrowseContext = () => {
                try {
                    const raw = localStorage.getItem(MASS_SECTION_CONTEXT_KEY);
                    return raw ? normalizeSectionContext(JSON.parse(raw)) : null;
                } catch (error) {
                    return null;
                }
            };

            let carriedSectionBrowseContext = null;

            const storeSectionBrowseContext = (context) => {
                const normalized = normalizeSectionContext(context);
                if (!normalized) return null;
                lastSectionBrowseContext = normalized;
                try {
                    localStorage.setItem(MASS_SECTION_CONTEXT_KEY, JSON.stringify(normalized));
                } catch (error) {}
                return normalized;
            };

            const getCurrentRootSectionId = () => {
                if (folderStack.length) {
                    return String(folderStack[0]?.item?.id || '').trim();
                }
                const currentId = String(getCurrentItem()?.id || '').trim();
                return ROOT_SECTION_IDS.has(currentId) ? currentId : '';
            };

            const deriveSectionArtist = (item, rootId = '') => {
                const metadata = getItemMeta(item);
                const candidates = [];
                if (rootId === 'artists') {
                    candidates.push(cleanTitle(item?.name || ''));
                }
                candidates.push(
                    String(item?.artist || '').trim(),
                    String(metadata.artist || '').trim(),
                    String(folderStack[folderStack.length - 1]?.item?.artist || '').trim(),
                );
                return candidates
                    .map((value) => cleanTitle(value))
                    .find(Boolean) || '';
            };

            const buildSectionBrowseContext = (item = getCurrentItem()) => {
                const rootId = getCurrentRootSectionId();
                if (!item || !rootId || !folderStack.length) return null;
                const metadata = getItemMeta(item);
                return normalizeSectionContext({
                    source: 'mass',
                    ts: Date.now(),
                    root_id: rootId,
                    artist: deriveSectionArtist(item, rootId),
                    album: String(item?.album || metadata.album || '').trim(),
                    title: cleanTitle(item?.name || item?.title || ''),
                    selection_key: itemKey(item),
                    selection_name: cleanTitle(item?.name || ''),
                });
            };

            const buildSectionSelectionAnchor = (rootId = getCurrentRootSectionId(), item = getCurrentItem()) => {
                const normalizedRootId = String(rootId || '').trim();
                if (!normalizedRootId || !item) return null;
                const selectionKey = itemKey(item);
                const selectionName = cleanTitle(item?.name || item?.title || '');
                if (!selectionKey && !selectionName) return null;
                return {
                    root_id: normalizedRootId,
                    selection_key: selectionKey,
                    selection_name: selectionName,
                };
            };

            const currentSelectionMatchesAnchor = (anchor) => {
                if (!anchor) return false;
                const currentRootId = getCurrentRootSectionId();
                const currentItem = getCurrentItem();
                const anchorRootId = String(anchor.root_id || '').trim();
                if (!anchorRootId || !currentItem || currentRootId !== anchorRootId) return false;

                const anchorKey = String(anchor.selection_key || '').trim();
                if (anchorKey) {
                    return itemKey(currentItem) === anchorKey;
                }

                const anchorName = normalizeLookup(anchor.selection_name || '');
                return !!anchorName && normalizeLookup(currentItem?.name || currentItem?.title) === anchorName;
            };

            const clearCarriedSectionBrowseContext = () => {
                carriedSectionBrowseContext = null;
            };

            const setCarriedSectionBrowseContext = (context, rootId, item) => {
                const normalizedContext = normalizeSectionContext(context);
                const anchor = buildSectionSelectionAnchor(rootId, item);
                if (!normalizedContext || !anchor) {
                    clearCarriedSectionBrowseContext();
                    return null;
                }
                carriedSectionBrowseContext = Object.assign({ context: normalizedContext }, anchor);
                return carriedSectionBrowseContext;
            };

            const resolveEffectiveSectionBrowseContext = () => {
                if (carriedSectionBrowseContext) {
                    if (currentSelectionMatchesAnchor(carriedSectionBrowseContext)) {
                        return normalizeSectionContext(carriedSectionBrowseContext.context);
                    }
                    clearCarriedSectionBrowseContext();
                }
                return buildSectionBrowseContext(getCurrentItem()) || lastSectionBrowseContext;
            };

            const rememberCurrentSectionBrowseContext = (item = getCurrentItem()) => {
                const context = buildSectionBrowseContext(item);
                if (!context) return null;
                return storeSectionBrowseContext(context);
            };

            const saveBrowseState = () => {
                try {
                    rememberCurrentSectionBrowseContext();
                    if (carriedSectionBrowseContext && !currentSelectionMatchesAnchor(carriedSectionBrowseContext)) {
                        clearCarriedSectionBrowseContext();
                    }
                    const current = getCurrentItem();
                    const payload = {
                        trail: folderStack.map((entry) => itemKey(entry.item)).filter(Boolean),
                        selection_key: itemKey(current),
                        selection_name: cleanTitle(current?.name),
                        selection_index: clampIndex(arcList.items, arcList.currentIndex),
                        saved_at: Date.now(),
                    };
                    localStorage.setItem(MASS_BROWSE_STATE_KEY, JSON.stringify(payload));
                } catch (error) {}
            };

            const loadBrowseState = () => {
                try {
                    const raw = localStorage.getItem(MASS_BROWSE_STATE_KEY);
                    return raw ? JSON.parse(raw) : null;
                } catch (error) {
                    return null;
                }
            };

            const findItemIndex = (items, predicate) => {
                if (!Array.isArray(items) || !items.length) return -1;
                return items.findIndex((entry) => {
                    try {
                        return predicate(entry);
                    } catch (error) {
                        return false;
                    }
                });
            };

            const resolveSectionSelectionIndex = (rootId, childItems, context) => {
                if (!Array.isArray(childItems) || !childItems.length) return -1;
                const normalizedContext = normalizeSectionContext(context);
                if (!normalizedContext) return -1;

                const artistKey = normalizeLookup(normalizedContext.artist);
                const albumKey = normalizeLookup(normalizedContext.album);
                const titleKey = normalizeLookup(normalizedContext.title);
                const contextRootId = String(normalizedContext.root_id || '').trim();
                const sectionId = String(rootId || '').trim();
                const matchArtistIndex = (preferName = false) => {
                    if (!artistKey) return -1;
                    return findItemIndex(childItems, (entry) => {
                        const entryArtist = preferName
                            ? normalizeLookup(entry?.name || entry?.artist || getItemMeta(entry).artist)
                            : normalizeLookup(entry?.artist || getItemMeta(entry).artist || entry?.name);
                        return !!entryArtist && entryArtist === artistKey;
                    });
                };
                const matchAlbumIndex = () => {
                    if (!albumKey) return -1;
                    return findItemIndex(childItems, (entry) => {
                        const entryAlbum = normalizeLookup(entry?.album || entry?.name || getItemMeta(entry).album);
                        if (!entryAlbum || entryAlbum !== albumKey) return false;
                        const entryArtist = normalizeLookup(entry?.artist || getItemMeta(entry).artist);
                        return !artistKey || !entryArtist || entryArtist === artistKey;
                    });
                };

                if (sectionId === 'artists') {
                    return matchArtistIndex(true);
                }

                if (sectionId === 'albums') {
                    if (albumKey && (contextRootId === 'titles' || contextRootId === 'albums')) {
                        const byAlbum = matchAlbumIndex();
                        if (byAlbum >= 0) return byAlbum;
                    }
                    if (artistKey) {
                        const byArtist = matchArtistIndex();
                        if (byArtist >= 0) return byArtist;
                    }
                    if (albumKey) {
                        return matchAlbumIndex();
                    }
                    return -1;
                }

                if (sectionId === 'titles') {
                    if (albumKey && (contextRootId === 'albums' || contextRootId === 'titles')) {
                        const byAlbum = findItemIndex(childItems, (entry) => {
                            const entryAlbum = normalizeLookup(entry?.album || getItemMeta(entry).album);
                            if (!entryAlbum || entryAlbum !== albumKey) return false;
                            const entryArtist = normalizeLookup(entry?.artist || getItemMeta(entry).artist);
                            return !artistKey || !entryArtist || entryArtist === artistKey;
                        });
                        if (byAlbum >= 0) return byAlbum;
                    }
                    if (artistKey) {
                        const byArtist = matchArtistIndex();
                        if (byArtist >= 0) return byArtist;
                    }
                    if (titleKey) {
                        return findItemIndex(childItems, (entry) =>
                            normalizeLookup(entry?.name || entry?.title) === titleKey);
                    }
                    return -1;
                }

                return -1;
            };

            const restoreBrowseState = (state) => {
                if (!state || typeof state !== 'object') return false;

                let currentItems = rootItems();
                folderStack.length = 0;

                for (const trailKey of Array.isArray(state.trail) ? state.trail : []) {
                    const folderIndex = currentItems.findIndex((entry) => itemKey(entry) === String(trailKey || '').trim());
                    const folder = folderIndex >= 0 ? currentItems[folderIndex] : null;
                    if (!folder || !Array.isArray(folder.tracks) || !folder.tracks.length) {
                        break;
                    }
                    folderStack.push({
                        item: folder,
                        items: currentItems.slice(),
                        currentIndex: folderIndex,
                        targetIndex: folderIndex,
                    });
                    currentItems = mapChildrenForParent(folder);
                }

                arcList.items = currentItems;

                let selectionIndex = -1;
                const selectionKey = String(state.selection_key || '').trim();
                if (selectionKey) {
                    selectionIndex = currentItems.findIndex((entry) => itemKey(entry) === selectionKey);
                }
                if (selectionIndex < 0) {
                    const selectionName = normalizeLookup(state.selection_name || '');
                    if (selectionName) {
                        selectionIndex = currentItems.findIndex((entry) => normalizeLookup(entry?.name) === selectionName);
                    }
                }
                arcList.currentIndex = clampIndex(currentItems, selectionIndex >= 0 ? selectionIndex : state.selection_index);
                arcList.targetIndex = arcList.currentIndex;
                return true;
            };

            const focusMappedFolder = (rootId, predicate) => {
                const roots = rootItems();
                const rootIndex = roots.findIndex((entry) => String(entry?.id || '').trim() === String(rootId || '').trim());
                if (rootIndex < 0) return false;

                const rootFolder = roots[rootIndex];
                const childItems = mapChildrenForParent(rootFolder);
                let selectionIndex = findItemIndex(childItems, predicate);
                if (selectionIndex < 0) return false;

                folderStack.length = 0;
                folderStack.push({
                    item: rootFolder,
                    items: roots.slice(),
                    currentIndex: rootIndex,
                    targetIndex: rootIndex,
                });
                arcList.items = childItems;
                arcList.currentIndex = clampIndex(childItems, selectionIndex);
                arcList.targetIndex = arcList.currentIndex;
                refreshList();
                saveBrowseState();
                return true;
            };

            const applyBrowseContext = (context) => {
                if (!context || typeof context !== 'object') return false;
                const contextStamp = Number(context.ts || 0);
                if (contextStamp && contextStamp <= lastBrowseContextStamp) return false;

                const artistKey = normalizeLookup(context.artist);
                const albumKey = normalizeLookup(context.album);
                const titleKey = normalizeLookup(context.title);

                const strategies = [];
                if (artistKey) {
                    strategies.push({
                        rootId: 'artists',
                        match: (entry) => normalizeLookup(entry?.artist || entry?.name) === artistKey,
                    });
                }
                if (albumKey) {
                    strategies.push({
                        rootId: 'albums',
                        match: (entry) => {
                            if (normalizeLookup(entry?.album || entry?.name) !== albumKey) return false;
                            const entryArtist = normalizeLookup(entry?.artist || getItemMeta(entry).artist);
                            return !artistKey || !entryArtist || entryArtist === artistKey;
                        },
                    });
                }
                if (titleKey) {
                    strategies.push({
                        rootId: 'titles',
                        match: (entry) => {
                            if (normalizeLookup(entry?.name || entry?.title) !== titleKey) return false;
                            const entryArtist = normalizeLookup(entry?.artist || getItemMeta(entry).artist);
                            return !artistKey || !entryArtist || entryArtist === artistKey;
                        },
                    });
                }

                const applied = strategies.some((strategy) => focusMappedFolder(strategy.rootId, strategy.match));
                if (applied) {
                    lastBrowseContextStamp = contextStamp || Date.now();
                    storeSectionBrowseContext(context);
                }
                return applied;
            };

            const rootItems = () => {
                const src = buildDisplayRootSource(withQueueRoot(arcList.parentData || preloadedData || []));
                return src.map((item, idx, arr) => applyRootPresentation(childNameMapper(item, idx, arr)));
            };

            const mapChildrenForParent = (parent) => {
                const parentImage = normalizeServiceImageUrl(parent?.image || '');
                const children = Array.isArray(parent?.tracks) ? parent.tracks : [];
                return children.map((child, idx, arr) => {
                    const mapped = childNameMapper(child, idx, arr);
                    if (!mapped.image && parentImage) {
                        mapped.image = parentImage;
                    }
                    return mapped;
                });
            };

            const CONTEXT_ROUTE = 'menu/mass';
            const contextMenuItems = () => rootItems()
                .filter((entry) => {
                    const entryId = String(entry?.id || '').trim();
                    return entryId && entryId !== 'queue' && ROOT_SECTION_IDS.has(entryId);
                })
                .map((entry) => ({
                    id: String(entry.id || '').trim(),
                    title: cleanTitle(entry.name || entry.id || ''),
                }));

            const resolveDefaultContextSectionId = () => {
                const entries = contextMenuItems();
                const availableIds = new Set(entries.map((entry) => entry.id));
                const rememberedId = String(lastSectionBrowseContext?.root_id || '').trim();
                if (rememberedId && availableIds.has(rememberedId)) {
                    return rememberedId;
                }
                const preferredOrder = ['artists', 'albums', 'titles', 'playlists', 'playlist_mixes', 'podcasts', 'mixes'];
                return preferredOrder.find((id) => availableIds.has(id)) || entries[0]?.id || '';
            };

            const resolveActiveContextSectionId = () =>
                String(folderStack[0]?.item?.id || '').trim();

            const resolveCurrentContextSectionId = () => {
                const lockedSectionId = resolveActiveContextSectionId();
                if (lockedSectionId && lockedSectionId !== 'queue') {
                    return lockedSectionId;
                }
                const currentId = String(getCurrentItem()?.id || '').trim();
                if (currentId && currentId !== 'queue' && ROOT_SECTION_IDS.has(currentId)) {
                    return currentId;
                }
                return resolveDefaultContextSectionId();
            };

            let lastPublishedContextMenuSignature = '';
            const publishContextMenu = () => {
                const payload = {
                    type: 'bs5c-context-menu',
                    route: CONTEXT_ROUTE,
                    items: contextMenuItems(),
                    selectedId: resolveCurrentContextSectionId(),
                    activeId: resolveActiveContextSectionId(),
                };
                window.__bs5cLastContextMenuPayload = payload;
                if (!window.parent || window.parent === window) return;
                const signature = JSON.stringify(payload);
                if (signature === lastPublishedContextMenuSignature) return;
                lastPublishedContextMenuSignature = signature;
                window.parent.postMessage(payload, '*');
            };

            const openContextSection = (sectionId, options = {}) => {
                const normalizedId = String(sectionId || '').trim();
                if (!normalizedId) return false;

                const activeSectionId = String(folderStack[0]?.item?.id || '').trim();
                const sourceContext = resolveEffectiveSectionBrowseContext();
                if (activeSectionId && activeSectionId !== normalizedId) {
                    rememberCurrentSectionBrowseContext();
                }

                if (activeSectionId === normalizedId) {
                    publishContextMenu();
                    return true;
                }

                const roots = rootItems();
                const rootIndex = roots.findIndex((entry) => String(entry?.id || '').trim() === normalizedId);
                if (rootIndex < 0) return false;

                const rootFolder = roots[rootIndex];
                const childItems = mapChildrenForParent(rootFolder);
                let nextIndex = 0;
                if (CROSS_SECTION_TARGET_IDS.has(normalizedId)) {
                    const contextualIndex = resolveSectionSelectionIndex(normalizedId, childItems, sourceContext);
                    if (contextualIndex >= 0) {
                        nextIndex = contextualIndex;
                    }
                }

                folderStack.length = 0;
                folderStack.push({
                    item: rootFolder,
                    items: roots.slice(),
                    currentIndex: rootIndex,
                    targetIndex: rootIndex,
                });
                arcList.items = childItems;
                arcList.currentIndex = clampIndex(childItems, nextIndex);
                arcList.targetIndex = arcList.currentIndex;
                refreshList();
                if (options.saveState !== false) {
                    saveBrowseState();
                }
                if (CROSS_SECTION_TARGET_IDS.has(normalizedId)) {
                    const landedItem = arcList.items[clampIndex(arcList.items, arcList.currentIndex)] || null;
                    setCarriedSectionBrowseContext(sourceContext, normalizedId, landedItem);
                } else {
                    clearCarriedSectionBrowseContext();
                }
                publishContextMenu();
                return true;
            };

            const returnToRootState = (preferredSectionId = '', options = {}) => {
                const roots = rootItems();
                const normalizedId = String(preferredSectionId || '').trim();
                const nextIndex = roots.findIndex((entry) => String(entry?.id || '').trim() === normalizedId);

                folderStack.length = 0;
                arcList.items = roots;
                arcList.currentIndex = clampIndex(roots, nextIndex >= 0 ? nextIndex : 0);
                arcList.targetIndex = arcList.currentIndex;
                refreshList();
                if (options.saveState !== false) {
                    saveBrowseState();
                }
                publishContextMenu();
                return true;
            };

            const postContextExit = (preferredSectionId = '') => {
                returnToRootState(preferredSectionId, { saveState: false });
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({
                        type: 'bs5c-context-exit',
                        route: CONTEXT_ROUTE,
                    }, '*');
                }
                return true;
            };

            const buildNowPlayingPayload = (item, pageData = null) => {
                const ancestors = folderStack
                    .map(entry => entry.item?.name || '')
                    .filter(Boolean);
                const immediateParent = ancestors[ancestors.length - 1] || '';
                const secondParent = ancestors[ancestors.length - 2] || '';
                const metadata = getItemMeta(item);
                const isFolder = Array.isArray(item?.tracks) && item.tracks.length > 0;
                const derivedArtist = metadata.artist
                    || item?.artist
                    || (isFolder ? cleanTitle(item?.name) : secondParent || '');
                const derivedAlbum = metadata.album
                    || item?.album
                    || (!isFolder ? immediateParent || '' : '');
                const artwork = normalizeServiceImageUrl(pageData?.image || '')
                    || metadata.artwork
                    || normalizeServiceImageUrl(item?.image || '');

                return {
                    title: cleanTitle(pageData?.title || item?.name),
                    artist: String(pageData?.artist || '').trim() || derivedArtist,
                    album: String(pageData?.album || '').trim() || derivedAlbum,
                    artwork,
                    state: 'playing',
                };
            };

            const pushNowPlayingPayload = (item, pageData = null) => {
                try {
                    const parentStore = window.parent?.uiStore;
                    if (!item) return;
                    const payload = buildNowPlayingPayload(item, pageData);
                    try {
                        window.sessionStorage?.setItem('bs5c_mass_now_playing', JSON.stringify(payload));
                    } catch (storageError) {}
                    if (!parentStore) return;
                    parentStore.activeSource = 'mass';
                    if (typeof parentStore.setActivePlayingPreset === 'function') {
                        parentStore.setActivePlayingPreset('mass');
                    }
                    if (typeof parentStore.handleMediaUpdate === 'function') {
                        parentStore.handleMediaUpdate(payload, 'mass-selection');
                    }
                } catch (err) {
                    console.warn('[MASS] Unable to update PLAYING panel:', err);
                }
            };

            const renderDetailParagraphs = (value) => {
                const blocks = String(value || '')
                    .split(/\n{2,}/)
                    .map((entry) => entry.trim())
                    .filter(Boolean);
                if (!blocks.length) return '';
                return blocks
                    .map((entry) => `<p>${escapeHtml(entry).replace(/\n/g, '<br>')}</p>`)
                    .join('');
            };

            const buildDetailFactsMarkup = (facts) => {
                const rows = Array.isArray(facts) ? facts.filter((entry) =>
                    entry && String(entry.label || '').trim() && String(entry.value || '').trim()) : [];
                if (!rows.length) return '';
                const body = rows.map((entry) => `
                    <div class="mass-detail-fact">
                        <div class="mass-detail-fact-label">${escapeHtml(entry.label)}</div>
                        <div class="mass-detail-fact-value">${escapeHtml(entry.value)}</div>
                    </div>
                `).join('');
                return `<div class="mass-detail-facts">${body}</div>`;
            };

            const buildFallbackDetailPage = (item) => {
                const metadata = getItemMeta(item);
                const title = cleanTitle(item?.name) || 'Info';
                const image = normalizeServiceImageUrl(item?.image || metadata.artwork || '');
                const artist = String(item?.artist || metadata.artist || '').trim();
                const album = String(item?.album || metadata.album || '').trim();
                const facts = [];
                if (artist) facts.push({ label: 'Artist', value: artist });
                if (album) facts.push({ label: 'Album', value: album });
                return {
                    title,
                    subtitle: [artist, album].filter(Boolean).join(' • '),
                    image,
                    facts,
                    description_label: '',
                    description: 'Live item details are unavailable right now, but playback is still available from this selection.',
                    play_uri: String(item?.url || item?.play_url || '').trim(),
                    artist,
                    album,
                };
            };

            let detailState = null;
            let detailRequestId = 0;
            let optionsState = null;

            const getDetailSpec = (item) => {
                const isLeaf = item && (!Array.isArray(item.tracks) || item.tracks.length === 0);
                const uri = String(item?.url || item?.play_url || '').trim();
                if (!isLeaf || !uri) return null;
                return {
                    uri,
                    loadingLabel: 'item',
                    emptyLabel: 'item',
                };
            };

            const clearPageView = () => {
                arcList.container?.querySelectorAll('.page-view, .options-view').forEach((node) => node.remove());
            };

            const setDetailCounter = () => {
                if (arcList.currentItemDisplay) arcList.currentItemDisplay.textContent = '';
                if (arcList.totalItemsDisplay) arcList.totalItemsDisplay.textContent = '';
            };

            const renderDetailPage = () => {
                if (!detailState || !arcList.container) return;
                clearPageView();
                arcList.container.querySelectorAll('.arc-item:not(.mass-breadcrumb)').forEach((node) => node.remove());
                renderBreadcrumbs();

                const page = document.createElement('div');
                page.className = 'page-view page-view-mass';
                page.style.opacity = '1';

                const scroll = document.createElement('div');
                scroll.className = 'page-view-scroll';

                const title = document.createElement('h2');
                title.className = 'page-view-title';
                title.textContent = detailState.page?.title || cleanTitle(detailState.item?.name) || 'Info';

                const body = document.createElement('div');
                body.className = 'page-view-body';

                if (detailState.loading) {
                    body.innerHTML = `<p>Loading ${detailState.spec?.loadingLabel || 'item'} information from MASS...</p>`;
                } else {
                    const image = normalizeServiceImageUrl(detailState.page?.image || '');
                    const subtitle = String(detailState.page?.subtitle || '').trim();
                    const factsMarkup = buildDetailFactsMarkup(detailState.page?.facts);
                    const description = String(detailState.page?.description || '').trim();
                    const descriptionLabel = String(detailState.page?.description_label || '').trim();
                    const content = [];
                    if (image) {
                        content.push(`<img src="${escapeHtml(image)}" alt="${escapeHtml(detailState.page?.title || detailState.item?.name || 'Artwork')}">`);
                    }
                    if (subtitle) {
                        content.push(`<p class="mass-detail-subtitle">${escapeHtml(subtitle)}</p>`);
                    }
                    if (factsMarkup) {
                        content.push(factsMarkup);
                    }
                    if (description) {
                        if (descriptionLabel) {
                            content.push(`<div class="mass-detail-section-label">${escapeHtml(descriptionLabel)}</div>`);
                        }
                        content.push(renderDetailParagraphs(description));
                    } else {
                        content.push('<p class="mass-detail-empty">No extra information is available for this item yet.</p>');
                    }
                    body.innerHTML = content.join('');
                }

                scroll.appendChild(title);
                scroll.appendChild(body);
                page.appendChild(scroll);
                arcList.container.appendChild(page);
                detailState.scrollEl = scroll;
                detailState.pageEl = page;
                setDetailCounter();
            };

            const closeDetailPage = () => {
                if (!detailState) return false;
                detailRequestId += 1;
                detailState = null;
                clearPageView();
                refreshList();
                return true;
            };

            const openDetailPage = async (item) => {
                const spec = getDetailSpec(item);
                if (!spec) return false;
                const safeItem = childNameMapper(item || {}, 0, [item || {}]);
                if (detailState?.item?.id === safeItem.id && !detailState.loading) return true;

                detailRequestId += 1;
                const requestId = detailRequestId;
                detailState = {
                    item: safeItem,
                    spec,
                    loading: true,
                    page: buildFallbackDetailPage(safeItem),
                    scrollEl: null,
                    pageEl: null,
                };
                renderDetailPage();

                try {
                    const response = await fetch(`${itemInfoUrl}?uri=${encodeURIComponent(spec.uri)}`, { cache: 'no-store' });
                    let payload = null;
                    try {
                        payload = await response.json();
                    } catch (error) {}
                    if (requestId !== detailRequestId || !detailState) return true;

                    if (!response.ok || !payload || payload.state === 'error') {
                        throw new Error(payload?.error || `item_info_${response.status}`);
                    }

                    detailState.loading = false;
                    detailState.page = Object.assign({}, buildFallbackDetailPage(safeItem), {
                        title: cleanTitle(payload.title || safeItem.name || 'Info'),
                        subtitle: String(payload.subtitle || '').trim(),
                        image: normalizeServiceImageUrl(payload.image || ''),
                        facts: Array.isArray(payload.facts) ? payload.facts : [],
                        description_label: String(payload.description_label || '').trim(),
                        description: String(payload.description || '').trim(),
                        play_uri: String(payload.play_uri || spec.uri || '').trim(),
                        artist: String(payload.artist || '').trim(),
                        album: String(payload.album || '').trim(),
                    });
                } catch (error) {
                    if (requestId !== detailRequestId || !detailState) return false;
                    detailState.loading = false;
                    detailState.page = buildFallbackDetailPage(safeItem);
                    console.warn('[MASS] Detail request failed:', spec.uri, error);
                }

                renderDetailPage();
                return true;
            };

            const massUriLooksLikeRadio = (value) => /radio:\/\/|\/radio\/|radios\//i.test(String(value || '').trim());

            const dismissOptionsMenu = (refresh = true) => {
                if (!optionsState) return false;
                optionsState = null;
                clearPageView();
                if (refresh) refreshList();
                return true;
            };

            const closeOptionsMenu = () => {
                if (!optionsState) return false;
                if (optionsState.parent) {
                    optionsState = optionsState.parent;
                    renderOptionsPage();
                    return true;
                }
                return dismissOptionsMenu(true);
            };

            const setOptionsSelection = (index) => {
                if (!optionsState || !Array.isArray(optionsState.entries) || !optionsState.entries.length) return;
                const maxIndex = optionsState.entries.length - 1;
                const nextIndex = Math.max(0, Math.min(maxIndex, Math.round(index || 0)));
                if (nextIndex === optionsState.currentIndex) return;
                optionsState.currentIndex = nextIndex;
                renderOptionsPage();
            };

            const moveOptionsSelection = (delta) => {
                if (!optionsState || !Array.isArray(optionsState.entries) || !optionsState.entries.length) return;
                setOptionsSelection((optionsState.currentIndex || 0) + delta);
            };

            const focusArtistFromItem = (item) => {
                const artistKey = normalizeLookup(deriveSectionArtist(item, getCurrentRootSectionId()) || getItemMeta(item).artist || item?.artist);
                if (!artistKey) return false;
                return focusMappedFolder('artists', (entry) => {
                    const entryArtist = normalizeLookup(entry?.artist || entry?.name || getItemMeta(entry).artist);
                    return !!entryArtist && entryArtist === artistKey;
                });
            };

            const focusAlbumFromItem = (item) => {
                const metadata = getItemMeta(item);
                const artistKey = normalizeLookup(deriveSectionArtist(item, getCurrentRootSectionId()) || metadata.artist || item?.artist);
                const albumKey = normalizeLookup(item?.album || metadata.album || item?.name);
                return focusMappedFolder('albums', (entry) => {
                    const entryArtist = normalizeLookup(entry?.artist || getItemMeta(entry).artist);
                    const entryAlbum = normalizeLookup(entry?.album || entry?.name || getItemMeta(entry).album);
                    if (albumKey && entryAlbum === albumKey) {
                        return !artistKey || !entryArtist || entryArtist === artistKey;
                    }
                    if (artistKey) {
                        return !!entryArtist && entryArtist === artistKey;
                    }
                    return false;
                });
            };

            const resolvePlaylistTargets = () => {
                const playlistRoot = rootItems().find((entry) => String(entry?.id || '').trim() === 'playlists');
                if (!playlistRoot) return [];
                return mapChildrenForParent(playlistRoot).filter((entry) =>
                    String(entry?.url || entry?.play_url || '').trim());
            };

            const openOptionsSubmenu = (item, title, subtitle, entries) => {
