                const safeEntries = Array.isArray(entries) ? entries.filter(Boolean) : [];
                if (!safeEntries.length) {
                    showActionToast('No options available', { preserveTiming: true });
                    settleActionToast();
                    return false;
                }
                optionsState = {
                    item,
                    title,
                    subtitle,
                    entries: safeEntries,
                    currentIndex: 0,
                    parent: optionsState,
                };
                renderOptionsPage();
                return true;
            };

            const buildMassOptionsEntries = (item) => {
                const safeItem = childNameMapper(item || {}, 0, [item || {}]);
                const metadata = getItemMeta(safeItem);
                const uri = String(safeItem?.url || safeItem?.play_url || '').trim();
                const artist = cleanTitle(deriveSectionArtist(safeItem, getCurrentRootSectionId()) || metadata.artist || safeItem?.artist || '');
                const album = cleanTitle(safeItem?.album || metadata.album || '');
                const playlistTargets = resolvePlaylistTargets();
                const isRadioItem = massUriLooksLikeRadio(uri);
                const isLeaf = !Array.isArray(safeItem?.tracks) || safeItem.tracks.length === 0;
                const canInspect = !!getDetailSpec(safeItem);
                const entries = [
                    {
                        id: 'play_now',
                        icon: 'play-circle',
                        title: 'Play Now',
                        onSelect: async () => {
                            dismissOptionsMenu(false);
                            await arcList.sendGoWebhook('play_now', safeItem);
                            refreshList();
                        },
                    },
                    !isRadioItem ? {
                        id: 'play_radio',
                        icon: 'broadcast',
                        title: 'Start Radio',
                        onSelect: async () => {
                            dismissOptionsMenu(false);
                            await arcList.sendGoWebhook('play_radio', safeItem);
                            refreshList();
                        },
                    } : null,
                    {
                        id: 'play_next',
                        icon: 'queue',
                        title: 'Play Next',
                        onSelect: async () => {
                            dismissOptionsMenu(false);
                            await arcList.sendGoWebhook('play_next', safeItem);
                            refreshList();
                        },
                    },
                    {
                        id: 'queue_item',
                        icon: 'list-plus',
                        title: 'Add to Queue',
                        onSelect: async () => {
                            dismissOptionsMenu(false);
                            await arcList.sendGoWebhook('queue_item', safeItem);
                            refreshList();
                        },
                    },
                    canInspect ? {
                        id: 'info',
                        icon: 'info',
                        title: 'Show Information',
                        onSelect: async () => {
                            dismissOptionsMenu(false);
                            await openDetailPage(safeItem);
                        },
                    } : null,
                    artist ? {
                        id: 'goto_artist',
                        icon: 'user-circle',
                        title: `Go to Artist`,
                        onSelect: () => {
                            dismissOptionsMenu(false);
                            if (!focusArtistFromItem(safeItem)) {
                                refreshList();
                                showActionToast('Artist not available', { preserveTiming: true });
                                settleActionToast();
                                return;
                            }
                            refreshList();
                        },
                    } : null,
                    (album || artist) ? {
                        id: 'goto_album',
                        icon: 'vinyl-record',
                        title: 'Go to Album',
                        onSelect: () => {
                            dismissOptionsMenu(false);
                            if (!focusAlbumFromItem(safeItem)) {
                                refreshList();
                                showActionToast('Album not available', { preserveTiming: true });
                                settleActionToast();
                                return;
                            }
                            refreshList();
                        },
                    } : null,
                    {
                        id: 'favorite_add',
                        icon: 'heart',
                        title: 'Add to Favorites',
                        onSelect: async () => {
                            dismissOptionsMenu(false);
                            await arcList.sendGoWebhook('favorite_add', safeItem);
                            refreshList();
                        },
                    },
                    playlistTargets.length ? {
                        id: 'playlist_add',
                        icon: 'plus-circle',
                        title: 'Add to Playlist...',
                        submenu: true,
                        onSelect: () => openOptionsSubmenu(
                            safeItem,
                            'Add to Playlist',
                            cleanTitle(safeItem?.name || 'Music Assistant'),
                            playlistTargets.map((playlist) => ({
                                id: `playlist_${playlist.id || playlist.url || playlist.name}`,
                                icon: 'music-notes-plus',
                                title: cleanTitle(playlist.name || 'Playlist'),
                                onSelect: async () => {
                                    dismissOptionsMenu(false);
                                    await arcList.sendGoWebhook('playlist_add', safeItem, {
                                        target_playlist_uri: String(playlist.url || playlist.play_url || '').trim(),
                                    });
                                    refreshList();
                                },
                            })),
                        ),
                    } : null,
                ];

                return entries.filter(Boolean);
            };

            const showOptionsForItem = (item = detailState?.item || getCurrentItem()) => {
                const safeItem = childNameMapper(item || {}, 0, [item || {}]);
                const entries = buildMassOptionsEntries(safeItem);
                if (!entries.length) return false;
                optionsState = {
                    item: safeItem,
                    title: 'Item Options',
                    subtitle: cleanTitle(safeItem?.name || 'Music Assistant'),
                    entries,
                    currentIndex: 0,
                    parent: null,
                };
                renderOptionsPage();
                return true;
            };

            const activateSelectedOption = async () => {
                const entry = optionsState?.entries?.[optionsState?.currentIndex || 0];
                if (!entry || typeof entry.onSelect !== 'function') return false;
                await entry.onSelect();
                return true;
            };

            const renderOptionsPage = () => {
                if (!optionsState || !arcList.container) return;
                clearPageView();
                arcList.container.querySelectorAll('.arc-item:not(.mass-breadcrumb)').forEach((node) => node.remove());
                renderBreadcrumbs();

                const page = document.createElement('div');
                page.className = 'options-view';

                const panel = document.createElement('div');
                panel.className = 'options-panel';

                const header = document.createElement('div');
                header.className = 'options-header';
                header.innerHTML = `
                    <div>
                        <div class="options-kicker">${escapeHtml(optionsState.parent ? 'Submenu' : 'Hold GO')}</div>
                        <h2 class="options-title">${escapeHtml(optionsState.title || 'Options')}</h2>
                        <div class="options-subtitle">${escapeHtml(optionsState.subtitle || '')}</div>
                    </div>
                    <div class="options-hint">GO Select<br>RIGHT Back</div>
                `;

                const list = document.createElement('div');
                list.className = 'options-list';
                optionsState.entries.forEach((entry, index) => {
                    const row = document.createElement('div');
                    row.className = `options-entry${index === optionsState.currentIndex ? ' is-selected' : ''}`;
                    row.innerHTML = `
                        <div class="options-entry-icon"><i class="ph ph-${escapeHtml(entry.icon || 'dots-three')}"></i></div>
                        <div class="options-entry-copy">
                            <div class="options-entry-title">${escapeHtml(entry.title || 'Option')}</div>
                        </div>
                        <div class="options-entry-arrow">${entry.submenu ? '&#8250;' : ''}</div>
                    `;
                    list.appendChild(row);
                });

                panel.appendChild(header);
                panel.appendChild(list);
                page.appendChild(panel);
                arcList.container.appendChild(page);
                requestAnimationFrame(() => {
                    list.querySelector('.options-entry.is-selected')?.scrollIntoView({
                        block: 'nearest',
                    });
                });
                setDetailCounter();
            };

            const getFastLetter = (value) => {
                const base = cleanTitle(String(value || '')).replace(/^[^A-Za-z0-9]+/, '').trim();
                if (!base) return '';
                const tokens = base.split(/\s+/).filter(Boolean);
                const token = tokens.length > 1 && FAST_LETTER_ARTICLES.has(tokens[0].toUpperCase())
                    ? tokens[1]
                    : tokens[0];
                const match = token.match(/[A-Za-z0-9]/);
                return match ? match[0].toUpperCase() : '';
            };

            const createBreadcrumbImage = (item) => {
                if (typeof arcList.createImageElement === 'function') {
                    return arcList.createImageElement(item);
                }
                const img = document.createElement('img');
                img.src    = item.image || '';
                img.alt    = item.name  || '';
                img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:18px;';
                return img;
            };

            // â”€â”€ Breadcrumbs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const renderBreadcrumbs = () => {
                if (!arcList.container) return;
                arcList.container.querySelectorAll('.mass-breadcrumb').forEach(n => n.remove());
                const crumbEntries = folderStack.slice(1).map((entry) => ({ item: entry.item }));
                if (detailState?.item) crumbEntries.push({ item: detailState.item });
                else if (optionsState?.item) crumbEntries.push({ item: optionsState.item });
                if (!crumbEntries.length) return;

                const visibleAncestors = crumbEntries.slice(-3);
                visibleAncestors.forEach((entry, idx, visible) => {
                    const depthFromCurrent  = visible.length - 1 - idx;
                    const isImmediateParent = depthFromCurrent === 0;
                    const scale = isImmediateParent
                        ? 0.82
                        : Math.max(0.42, 0.58 - depthFromCurrent * 0.08);
                    const x = -250 - depthFromCurrent * 120;
                    const y = isImmediateParent
                        ? 0
                        : (idx - (visible.length - 1) / 2) * 56;

                    const crumb = document.createElement('div');
                    crumb.className = `arc-item mass-breadcrumb${isImmediateParent ? ' breadcrumb selected' : ''}`;
                    crumb.dataset.animatedParent = 'true';
                    Object.assign(crumb.style, {
                        position:    'absolute',
                        top:         '50%',
                        left:        '50%',
                        marginLeft:  '-140px',
                        marginTop:   '-64px',
                        transform:   `translate(${x}px, ${y}px) scale(${scale})`,
                        opacity:     `${isImmediateParent ? 1 : Math.max(0.45, 0.82 - depthFromCurrent * 0.18)}`,
                        zIndex:      `${5 + idx}`,
                        pointerEvents: 'none',
                        filter:      isImmediateParent ? 'none' : 'brightness(0.78)',
                    });

                    const nameEl = document.createElement('div');
                    nameEl.className = 'item-name';
                    nameEl.textContent = entry.item.name || '';
                    if (isImmediateParent) nameEl.classList.add('selected');

                    const imageWrap = document.createElement('div');
                    imageWrap.className = 'item-image-container';
                    imageWrap.appendChild(createBreadcrumbImage(entry.item));

                    crumb.appendChild(nameEl);
                    crumb.appendChild(imageWrap);
                    arcList.container.appendChild(crumb);
                });
            };

            let pendingGoPress = null;
            const clearPendingGoPress = () => {
                if (pendingGoPress) {
                    clearTimeout(pendingGoPress);
                    pendingGoPress = null;
                }
            };

            const refreshQueueRoot = async (preserveSelection = true) => {
                const raw = await fetchJson(queueUrl, {
                    timeoutMs: 900,
                    cacheMode: 'no-store',
                });
                if (!raw || raw.state === 'empty' || !Array.isArray(raw.tracks) || !raw.tracks.length) {
                    queueRootNode = null;
                } else {
                    queueRootNode = Object.assign({}, raw);
                    collectTrackMeta(queueRootNode);
                }

                if (!folderStack.length) {
                    const previousId = preserveSelection ? getCurrentItem()?.id : '';
                    arcList.items = rootItems();
                    const nextIndex = previousId
                        ? Math.max(0, arcList.items.findIndex((entry) => entry.id === previousId))
                        : 0;
                    arcList.currentIndex = clampIndex(arcList.items, nextIndex);
                    arcList.targetIndex = arcList.currentIndex;
                    refreshList();
                } else if (folderStack.length === 1) {
                    const currentSectionId = String(folderStack[0]?.item?.id || '').trim();
                    if (currentSectionId) {
                        openContextSection(currentSectionId, { saveState: false });
                    }
                }
            };

            const refreshList = () => {
                if (optionsState) {
                    renderOptionsPage();
                    saveBrowseState();
                    return;
                }
                if (detailState) {
                    renderDetailPage();
                    saveBrowseState();
                    return;
                }
                clearPageView();
                arcList.viewMode      = 'single';
                arcList.selectedParent = null;
                arcList.currentIndex  = clampIndex(arcList.items, arcList.currentIndex);
                arcList.targetIndex   = arcList.currentIndex;
                if (arcList.totalItemsDisplay)
                    arcList.totalItemsDisplay.textContent = arcList.items.length;
                if (typeof arcList.updateCounter === 'function') arcList.updateCounter();
                if (typeof originalRender === 'function') originalRender();
                renderBreadcrumbs();
                saveBrowseState();
                publishContextMenu();
            };

            let fastLetterTimer = null;
            const showFastLetter = () => {
                const current = getCurrentItem();
                const letter = getFastLetter(current?.name);
                if (!letter) return;
                let overlay = document.getElementById('fast-letter-overlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'fast-letter-overlay';
                    overlay.className = 'fast-letter-overlay';
                    document.getElementById('app')?.appendChild(overlay);
                }
                overlay.textContent = letter;
                overlay.classList.add('visible');
                if (fastLetterTimer) clearTimeout(fastLetterTimer);
                fastLetterTimer = setTimeout(() => overlay.classList.remove('visible'), 280);
            };

            // â”€â”€ Folder navigation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const enterFolder = () => {
                const current = getCurrentItem();
                if (!current || !Array.isArray(current.tracks) || current.tracks.length === 0)
                    return false;
                const enteringFromRoot = folderStack.length === 0;
                const rootId = String(current.id || '').trim();

                folderStack.push({
                    item:         current,
                    items:        arcList.items.slice(),
                    currentIndex: clampIndex(arcList.items, arcList.currentIndex),
                    targetIndex:  clampIndex(arcList.items, arcList.targetIndex),
                });

                arcList.items        = mapChildrenForParent(current);
                let nextIndex = 0;
                if (enteringFromRoot && CROSS_SECTION_TARGET_IDS.has(rootId)) {
                    const contextualIndex = resolveSectionSelectionIndex(rootId, arcList.items, lastSectionBrowseContext);
                    if (contextualIndex >= 0) {
                        nextIndex = contextualIndex;
                    }
                }
                arcList.currentIndex = clampIndex(arcList.items, nextIndex);
                arcList.targetIndex  = arcList.currentIndex;
                refreshList();
                console.log('[MASS] Entered folder:', current.name);
                return true;
            };

            const exitFolder = () => {
                if (!folderStack.length) return false;
                rememberCurrentSectionBrowseContext();
                if (folderStack.length === 1) {
                    const activeSectionId = String(folderStack[0]?.item?.id || '').trim();
                    console.log('[MASS] Closing context view back to main menu');
                    return postContextExit(activeSectionId);
                }
                const previous = folderStack.pop();
                if (!previous) return false;

                arcList.items        = previous.items;
                arcList.currentIndex = previous.currentIndex;
                arcList.targetIndex  = previous.targetIndex;
                refreshList();
                console.log('[MASS] Exited folder');
                return true;
            };


            // â”€â”€ Override ArcList methods â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

            arcList.render = function () {
                if (optionsState) {
                    renderOptionsPage();
                    return;
                }
                if (detailState) {
                    renderDetailPage();
                    return;
                }
                clearPageView();
                if (typeof originalRender === 'function') originalRender();
                renderBreadcrumbs();
                publishContextMenu();
            };

            arcList.saveState = function () {
                if (typeof originalSaveState === 'function') {
                    originalSaveState();
                }
                saveBrowseState();
            };

            arcList.checkForSelectionClick = function () {
                if (typeof originalCheckForSelectionClick === 'function') {
                    originalCheckForSelectionClick();
                }
                if (!detailState && !optionsState) {
                    rememberCurrentSectionBrowseContext();
                }
            };

            arcList.destroy = function () {
                saveBrowseState();
                if (typeof originalDestroy === 'function') {
                    originalDestroy();
                }
            };

            // GO = PLAY (leaf via `url`, folder via `play_url`)
            // LEFT = navigate INTO folder
            // RIGHT = navigate OUT of folder
            arcList.sendGoWebhook = async function (command = 'play_item', itemOverride = null, extraPayload = {}) {
                const current = itemOverride || detailState?.item || optionsState?.item || getCurrentItem();
                if (!current) return;
                if (detailState?.loading) return;

                const playUri = String(
                    extraPayload.url
                    || extraPayload.play_url
                    || detailState?.page?.play_uri
                    || current.url
                    || current.play_url
                    || ''
                ).trim();

                if (!playUri && !['favorite_add', 'playlist_add'].includes(command)) {
                    console.warn('[MASS] No playback URI for item:', current.name);
                    return;
                }

                if (typeof arcList.snapToNearest === 'function') arcList.snapToNearest();

                const commandMessages = {
                    play_item:    { pending: 'Adding to queue…', error: 'Error adding to queue', queued: 'Added to queue', playing: 'Starting playback' },
                    play_now:     { pending: 'Starting playback', error: 'Error starting playback', queued: 'Queued for immediate playback', playing: 'Starting playback' },
                    play_next:    { pending: 'Queueing next…', error: 'Error queueing next', queued: 'Queued to play next', playing: 'Queued to play next' },
                    queue_item:   { pending: 'Adding to queue…', error: 'Error adding to queue', queued: 'Added to queue', playing: 'Added to queue' },
                    play_radio:   { pending: 'Starting radio…', error: 'Error starting radio', queued: 'Starting radio', playing: 'Starting radio' },
                    favorite_add: { pending: 'Adding to favorites…', error: 'Error adding to favorites', favorited: 'Added to favorites' },
                    playlist_add: { pending: 'Adding to playlist…', error: 'Error adding to playlist', playlist_added: 'Added to playlist' },
                };
                const copy = commandMessages[command] || commandMessages.play_item;
                const payload = Object.assign({
                    command,
                    id: current.id || '',
                    url: current.url || '',
                    play_url: current.play_url || '',
                }, extraPayload || {});

                showActionToast(copy.pending);

                try {
                    const response = await fetch(sourceCommandUrl, {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify(payload),
                    });
                    let result = null;
                    try {
                        result = await response.json();
                    } catch (e) {}
                    if (!response.ok) {
                        showActionToast(copy.error, { preserveTiming: true });
                        settleActionToast();
                        console.warn('[MASS] Command failed:', response.status);
                        return;
                    }
                    if (result?.state === 'error') {
                        showActionToast(copy.error, { preserveTiming: true });
                        settleActionToast();
                        console.warn('[MASS] Service rejected command:', result);
                        return;
                    }

                    const state = String(result?.state || '').trim().toLowerCase();
                    const successMessage = copy[state] || copy.playing || copy.queued || copy.pending;
                    showActionToast(successMessage, { preserveTiming: true });
                    if (state === 'playing' || command === 'play_now' || command === 'play_radio') {
                        pushNowPlayingPayload(current, detailState?.page || null);
                    }
                    if (state === 'queued' || state === 'playing' || state === 'playlist_added') {
                        await refreshQueueRoot(false);
                    }
                    settleActionToast();
                    console.log('[MASS] Command complete:', command, current.name, '→', playUri, result);
                } catch (err) {
                    showActionToast(copy.error, { preserveTiming: true });
                    settleActionToast();
                    console.warn('[MASS] Command error:', err);
                }
            };

            const schedulePlayCommand = () => {
                clearPendingGoPress();
                return arcList.sendGoWebhook('play_item');
            };

            arcList.handleButtonFromParent = function (button) {
                const normalized = String(button || '').toLowerCase();
                if (optionsState) {
                    if (normalized === 'left') {
                        const entry = optionsState.entries?.[optionsState.currentIndex || 0];
                        if (entry?.submenu && typeof entry.onSelect === 'function') {
                            return entry.onSelect();
                        }
                    }
                    if (normalized === 'right') { if (closeOptionsMenu()) return; }
                    if (normalized === 'go') { return activateSelectedOption(); }
                    if (normalized === 'go_long' || normalized === 'go_hold') return;
                    return;
                }
                if (detailState) {
                    if (normalized === 'right') { if (closeDetailPage()) return; }
                    if (normalized === 'go_long' || normalized === 'go_hold') {
                        clearPendingGoPress();
                        return showOptionsForItem(detailState.item);
                    }
                    if (normalized === 'go') { return schedulePlayCommand(); }
                    return;
                }
                if (normalized === 'left')  {
                    clearPendingGoPress();
                    const current = getCurrentItem();
                    if (current && getDetailSpec(current)) { openDetailPage(current); return; }
                    if (enterFolder()) return;
                }
                if (normalized === 'right') {
                    clearPendingGoPress();
                    if (exitFolder()) return;
                    return;
                }
                if (normalized === 'go_long' || normalized === 'go_hold') {
                    clearPendingGoPress();
                    return showOptionsForItem();
                }
                if (normalized === 'go')    { return schedulePlayCommand(); }
                clearPendingGoPress();
                if (originalHandleButtonFromParent) originalHandleButtonFromParent(button);
            };

            arcList.handleKeyPress = function (e) {
                clearPendingGoPress();
                if (optionsState) {
                    if (e.key === 'ArrowUp') { moveOptionsSelection(-1); return; }
                    if (e.key === 'ArrowDown') { moveOptionsSelection(1); return; }
                    if (e.key === 'ArrowLeft') {
                        const entry = optionsState.entries?.[optionsState.currentIndex || 0];
                        if (entry?.submenu && typeof entry.onSelect === 'function') {
                            return entry.onSelect();
                        }
                        return;
                    }
                    if (e.key === 'ArrowRight' || e.key === 'Escape' || e.key === 'Backspace') { if (closeOptionsMenu()) return; }
                    if (e.key === 'Enter') { return activateSelectedOption(); }
                    return;
                }
                if (detailState) {
                    if (e.key === 'ArrowUp')    { if (detailState.scrollEl) detailState.scrollEl.scrollTop -= 42; return; }
                    if (e.key === 'ArrowDown')  { if (detailState.scrollEl) detailState.scrollEl.scrollTop += 42; return; }
                    if (e.key === 'ArrowRight') { if (closeDetailPage()) return; }
                    if (e.key === 'Enter')      { return arcList.sendGoWebhook('play_item'); }
                    return;
                }
                if (e.key === 'ArrowLeft')  {
                    const current = getCurrentItem();
                    if (current && getDetailSpec(current)) { openDetailPage(current); return; }
                    if (enterFolder()) return;
                }
                if (e.key === 'ArrowRight') {
                    if (exitFolder()) return;
                    return;
                }
                if (e.key === 'Enter')      { return arcList.sendGoWebhook('play_item'); }
                if (originalHandleKeyPress) originalHandleKeyPress(e);
            };

            arcList.handleNavFromParent = function (data) {
                if (optionsState) {
                    const direction = data?.direction;
                    if (direction === 'clock') moveOptionsSelection(1);
                    else if (direction === 'counter') moveOptionsSelection(-1);
                    return;
                }
                if (detailState?.scrollEl) {
                    const direction = data?.direction;
                    const speed = Math.max(1, Number(data?.speed || 1));
                    const delta = speed * 8;
                    if (direction === 'clock') {
                        detailState.scrollEl.scrollTop += delta;
                    } else if (direction === 'counter') {
                        detailState.scrollEl.scrollTop -= delta;
                    }
                    return;
                }
                if (originalHandleNavFromParent) {
                    originalHandleNavFromParent(data);
                }
                if (Number(data?.speed || 1) >= FAST_LETTER_MIN_SPEED) {
                    showFastLetter();
                }
            };

            arcList.handleBrowseContextFromParent = function (context) {
                return applyBrowseContext(context);
            };

            const initNavigation = () => {
                arcList.parentData    = Array.isArray(preloadedData) ? preloadedData : [];
                lastSectionBrowseContext = loadSectionBrowseContext();
                returnToRootState(resolveDefaultContextSectionId(), { saveState: false });
                refreshList();
                requestAnimationFrame(() => refreshList());
                setTimeout(() => refreshList(), 120);
                setTimeout(() => refreshList(), 420);
                arcList._massFolderStack = folderStack;
                window.arcListInstance = arcList;
                console.log('[MASS] Navigation layer initialized from preloaded cache');
            };
            setTimeout(initNavigation, 0);
            void refreshQueueRoot(true);
            setInterval(() => {
                void refreshQueueRoot(true);
            }, 5000);

            window.addEventListener('message', (event) => {
                if (event.data?.type === 'context-select') {
                    const sectionId = String(event.data?.id || '').trim();
                    if (!sectionId) return;
                    openContextSection(sectionId);
                    return;
                }
                if (event.data?.type === 'context-reset') {
                    returnToRootState(resolveCurrentContextSectionId(), { saveState: false });
                }
            });
        }
    </script>
</body>
</html>
