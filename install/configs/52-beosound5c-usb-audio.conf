# BeoSound 5c: USB S/PDIF audio configuration
# When a USB S/PDIF adapter (e.g. DollaTek PCM2704) is plugged in:
#   1. Use IEC958 (S/PDIF coax) output profile instead of analog stereo
#   2. Give it higher priority than HDMI so it becomes the default sink
#
# The coax output connects to the PC2 MasterLink card inside the BS5 chassis.

# Set the device profile to IEC958 digital output (coax S/PDIF)
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "~alsa_card.usb-*" }
    ]
    actions = {
      update-props = {
        device.profile = "output:iec958-stereo"
      }
    }
  },
  {
    matches = [
      { node.name = "~alsa_output.usb-*" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
      }
    }
  }
]
