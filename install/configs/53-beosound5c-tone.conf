# BeoSound 5c — PipeWire filter-chain for bass/treble/balance/loudness.
#
# Creates a virtual stereo sink named ``beo_tone_sink`` that feeds the
# real output through four shelf filters per channel plus a per-channel
# "mixer" gain (for balance).  All controls are plain filter-graph
# params, so wireplumber's stream-volume restore can't overwrite them.
#
# masterlink.py drives this via pw-cli:
#   bass/treble/loudness:  sets *_FL:Gain and *_FR:Gain together
#   balance:               sets bal_FL:Gain\ 1 and bal_FR:Gain\ 1
context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "BeoSound 5c Tone"
            media.name       = "BeoSound 5c Tone"
            filter.graph = {
                nodes = [
                    # User tone controls (one filter per channel for
                    # explicit routing into the mono balance mixers).
                    {   type = builtin  name = bass_FL          label = bq_lowshelf
                        control = { "Freq" = 200.0   "Q" = 0.707 "Gain" = 0.0 } }
                    {   type = builtin  name = bass_FR          label = bq_lowshelf
                        control = { "Freq" = 200.0   "Q" = 0.707 "Gain" = 0.0 } }
                    {   type = builtin  name = treble_FL        label = bq_highshelf
                        control = { "Freq" = 5000.0  "Q" = 0.707 "Gain" = 0.0 } }
                    {   type = builtin  name = treble_FR        label = bq_highshelf
                        control = { "Freq" = 5000.0  "Q" = 0.707 "Gain" = 0.0 } }
                    # Loudness — fixed shelf pair toggled via Gain.
                    {   type = builtin  name = loud_bass_FL     label = bq_lowshelf
                        control = { "Freq" = 100.0   "Q" = 0.707 "Gain" = 0.0 } }
                    {   type = builtin  name = loud_bass_FR     label = bq_lowshelf
                        control = { "Freq" = 100.0   "Q" = 0.707 "Gain" = 0.0 } }
                    {   type = builtin  name = loud_treble_FL   label = bq_highshelf
                        control = { "Freq" = 10000.0 "Q" = 0.707 "Gain" = 0.0 } }
                    {   type = builtin  name = loud_treble_FR   label = bq_highshelf
                        control = { "Freq" = 10000.0 "Q" = 0.707 "Gain" = 0.0 } }
                    # Balance — mono mixer per channel, one input each,
                    # "Gain 1" controls how much of that channel passes.
                    {   type = builtin  name = bal_FL           label = mixer
                        control = { "Gain 1" = 1.0 } }
                    {   type = builtin  name = bal_FR           label = mixer
                        control = { "Gain 1" = 1.0 } }
                ]
                links = [
                    # FL chain
                    { output = "bass_FL:Out"         input = "treble_FL:In" }
                    { output = "treble_FL:Out"       input = "loud_bass_FL:In" }
                    { output = "loud_bass_FL:Out"    input = "loud_treble_FL:In" }
                    { output = "loud_treble_FL:Out"  input = "bal_FL:In 1" }
                    # FR chain
                    { output = "bass_FR:Out"         input = "treble_FR:In" }
                    { output = "treble_FR:Out"       input = "loud_bass_FR:In" }
                    { output = "loud_bass_FR:Out"    input = "loud_treble_FR:In" }
                    { output = "loud_treble_FR:Out"  input = "bal_FR:In 1" }
                ]
                inputs  = [ "bass_FL:In"  "bass_FR:In"  ]
                outputs = [ "bal_FL:Out"  "bal_FR:Out"  ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name        = "beo_tone_sink"
                node.description = "BeoSound 5c Tone"
                media.class      = Audio/Sink
                priority.session = 2500
            }
            playback.props = {
                node.name   = "beo_tone_sink.output"
                node.passive = true
            }
        }
    }
]
